version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: observability_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: observability
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: observability_api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/observability
      - ENVIRONMENT=production
      - OLLAMA_API_BASE=http://host.docker.internal:11434
      - JWT_SECRET_KEY=3aef6678ab22cd4f11f43a992bc80918731558291a1a5b827e8a939f8df2d2b5
      - SENDGRID_API_KEY=mock-sendgrid-key
      - SENDGRID_FROM_EMAIL=noreply@company.com
      - OPENAI_API_KEY=mock-openai-key
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: observability_dashboard
    environment:
      - BACKEND_API_URL=http://api:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
