[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
mypy_path = "backend"
exclude = ["venv", ".git", ".pytest_cache", ".ruff_cache", "backend/tests"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
testpaths = ["backend/tests"]
